    // ── Populate page from data ─────────────────────────────────────────
    function populate(d) {
        document.title = d.titlePlain + ' | Projects | SUNJIN VIETNAM';

        // Left panel
        const mp = document.getElementById('main-photo');
        mp.src = d.images[0]; mp.alt = d.titlePlain;

        document.getElementById('award-badge-text').textContent = d.award;
        document.getElementById('proj-category').textContent = d.category;
        document.getElementById('proj-title').innerHTML = d.title;
        document.getElementById('proj-year-loc').textContent = d.yearLoc;

        // Thumbnails
        document.getElementById('thumb-strip').innerHTML = d.images.map((src, i) => {
            const thumbSrc = src.includes('unsplash') ? src.replace('w=1400', 'w=200') : src;
            return `<img class="thumb${i===0?' active':''}" onclick="changePhoto(this,'${src}')" src="${thumbSrc}" alt="View ${i+1}">`;
        }).join('');

        // Meta
        document.getElementById('mi-location').innerHTML = d.meta.location;
        document.getElementById('mi-year').textContent = d.meta.year;
        document.getElementById('mi-typology').innerHTML = d.meta.typology;
        document.getElementById('mi-area').textContent = d.meta.area;
        document.getElementById('mi-client').innerHTML = d.meta.client;
        document.getElementById('mi-status').textContent = d.meta.status;

        // Lead
        document.getElementById('proj-lead').textContent = d.lead;

        // Photos
        const p1 = document.getElementById('proj-photo1');
        p1.src = d.images[1] || d.images[0]; p1.alt = d.photo1alt || d.titlePlain;
        document.getElementById('proj-photo1-cap').textContent = d.photo1cap;

        const p2 = document.getElementById('proj-photo2');
        p2.src = d.images[2] || d.images[0]; p2.alt = d.photo2alt || d.titlePlain;
        document.getElementById('proj-photo2-cap').textContent = d.photo2cap;

        const p3 = document.getElementById('proj-photo3');
        p3.src = d.images[3] || d.images[0]; p3.alt = d.photo3alt || d.titlePlain;
        document.getElementById('proj-photo3-cap').textContent = d.photo3cap;

        // Narrative
        document.getElementById('proj-narrative1').innerHTML = d.narrative1.map(p => `<p class="body-para">${p}</p>`).join('');
        document.getElementById('proj-narrative2').innerHTML = d.narrative2.map(p => `<p class="body-para">${p}</p>`).join('');

        // Highlights
        document.getElementById('proj-highlights').innerHTML = d.highlights.map(h => `<div class="highlight-item">${h}</div>`).join('');

        // Specs
        document.getElementById('proj-specs').innerHTML = d.specs.map(s => `<div class="spec-row"><span class="spec-key">${s.k}</span><span class="spec-val">${s.v}</span></div>`).join('');

        // Credits
        document.getElementById('proj-credits').innerHTML = d.credits.map(c => `<div class="credit-row"><span class="credit-role">${c.r}</span><span class="credit-name">${c.n}</span></div>`).join('');

        // Awards
        document.getElementById('proj-awards-inner').innerHTML = d.awards.map(a => `<div class="credit-row"><span class="credit-role">${a.a}</span><span class="credit-name">${a.d}</span></div>`).join('');

        // Next project
        if (d.next) {
            document.getElementById('proj-next-link').href = 'project-detail.html?id=' + d.next.id;
            const ni = document.getElementById('proj-next-img');
            ni.src = d.next.img; ni.alt = d.next.title;
            document.getElementById('proj-next-ty').textContent = d.next.ty;
            document.getElementById('proj-next-title').textContent = d.next.title;
        }
    }

    const id = new URLSearchParams(window.location.search).get('id') || 'grandtourane';
    populate(PROJECTS[id] || PROJECTS['grandtourane']);

    // ── Custom cursor ─────────────────────────────────────────────────
    const dot = document.getElementById('cursor-dot');
    const outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', e => {
        dot.style.left = `${e.clientX}px`;
        dot.style.top  = `${e.clientY}px`;
        outline.animate({ left:`${e.clientX}px`, top:`${e.clientY}px` }, { duration:500, fill:'forwards' });
    });
    document.querySelectorAll('a,button,label,input,textarea,.thumb').forEach(el => {
        el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
        el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });

    // ── Photo switcher ────────────────────────────────────────────────
    function changePhoto(thumb, src) {
        document.getElementById('main-photo').src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
    }

    // ── Accordion ─────────────────────────────────────────────────────
    function toggleAccordion(btn) {
        const content = btn.nextElementSibling;
        const chevron = btn.querySelector('.accordion-chevron');
        const isOpen  = content.classList.contains('open');
        document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('open'));
        document.querySelectorAll('.accordion-chevron').forEach(ch => ch.style.transform = '');
        if (!isOpen) {
            content.classList.add('open');
            chevron.style.transform = 'rotate(180deg)';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const firstChevron = document.querySelector('.accordion-header .accordion-chevron');
        if (firstChevron) firstChevron.style.transform = 'rotate(180deg)';
    });
    </script>
